# docker/grafana/provisioning/datasources/datasources.yml
# Grafana auto-provisioning: fontes de dados configuradas automaticamente na inicialização

apiVersion: 1

datasources:

  - name:      Prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    isDefault: true
    editable:  true
    jsonData:
      httpMethod:       POST
      timeInterval:     "15s"
      exemplarTraceIdDestinations:
        - name:                   traceID
          datasourceUid:          jaeger
          urlDisplayLabel:        "View in Jaeger"

  - name:    Jaeger
    type:    jaeger
    access:  proxy
    url:     http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        customQuery: true
