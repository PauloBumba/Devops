# docker/prometheus.yml

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'observabilitylab'

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # ASP.NET Core app — /metrics endpoint (OpenTelemetry Prometheus exporter)
  - job_name: 'api'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   'observabilitylab-api'

  # OpenTelemetry Collector metrics
  - job_name: 'otelcollector'
    static_configs:
      - targets: ['otelcollector:8889']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis (requires redis_exporter sidecar in production)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
